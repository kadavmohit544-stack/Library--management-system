<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Smart Library</title>

    <link rel="stylesheet" href="css/settings.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            <i class="fa-solid fa-book-open-reader"></i>
            <span>Smart Library</span>
        </div>

        <div class="student">
            <img src="images/student.png" alt="Student">
            <h3>Settings</h3>
        </div>

    </header>

    <!-- Settings Container -->
    <section class="settings-container">

        <h1><i class="fa-solid fa-gear"></i> Account Settings</h1>

        <form id="settingsForm">

            <!-- Personal Information -->
            <div class="settings-card">

                <h2>Personal Information</h2>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" value="Chunendra Damahe">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" value="student@gpgondia.ac.in">
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="text" value="+91 9876543210">
                </div>

            </div>

            <!-- Password -->
            <div class="settings-card">

                <h2>Change Password</h2>

                <div class="input-group">
                    <label>Current Password</label>
                    <input type="password" placeholder="Enter Current Password">
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Enter New Password">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm New Password">
                </div>

            </div>

            <!-- Preferences -->
            <div class="settings-card">

                <h2>Preferences</h2>

                <div class="checkbox-group">
                    <input type="checkbox" id="notification" checked>
                    <label for="notification">Enable Notifications</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="darkmode">
                    <label for="darkmode">Enable Dark Mode</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="emailalerts" checked>
                    <label for="emailalerts">Email Alerts</label>
                </div>

            </div>

            <!-- Buttons -->
            <div class="buttons">

                <button type="submit" class="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Changes
                </button>

                <button type="reset" class="reset-btn">
                    <i class="fa-solid fa-rotate-left"></i>
                    Reset
                </button>

                <a href="student-dashboard.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to Dashboard
                </a>

            </div>

        </form>

    </section>

    <script src="js/settings.js"></script>

</body>

</html>
