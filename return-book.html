<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Return Book | Smart Library</title>

    <link rel="stylesheet" href="css/return.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="page-header">

        <div>

            <h1>
                <i class="fas fa-undo-alt"></i>
                Return Book
            </h1>

            <p>Manage returned books and fines</p>

        </div>

    </div>

    <!-- Return Form -->

    <div class="return-card">

        <h2>Return Details</h2>

        <form id="returnForm">

            <div class="form-grid">

                <div class="input-box">

                    <label>Issued Record</label>

                    <select id="issueRecord">

                        <option value="">Select Issued Book</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Return Date</label>

                    <input
                        type="date"
                        id="returnDate">

                </div>

                <div class="input-box">

                    <label>Fine (₹)</label>

                    <input
                        type="number"
                        id="fine"
                        value="0"
                        readonly>

                </div>

                <div class="input-box">

                    <label>Status</label>

                    <input
                        type="text"
                        value="Returned"
                        readonly>

                </div>

            </div>

            <button
                type="button"
                id="returnBtn">

                <i class="fas fa-check-circle"></i>

                Return Book

            </button>

        </form>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchReturn"
            placeholder="Search Student or Book">

    </div>

    <!-- Table -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Student</th>
                    <th>Book</th>
                    <th>Return Date</th>
                    <th>Fine</th>
                    <th>Status</th>
                    <th>Action</th>
                    <td>

<button
class="action-btn delete-btn"
onclick="deleteReturn($index)">

<i class="fas fa-trash"></i>

</button>

</td>

                </tr>

            </thead>

            <tbody id="returnTable">

            </tbody>

        </table>

    </div>

</div>


<script src="js/return.js"></script>

</body>

</html>
