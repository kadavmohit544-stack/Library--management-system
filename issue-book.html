<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book | Smart Library</title>

    <link rel="stylesheet" href="css/issue.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-book-reader"></i>
                Issue Book
            </h1>

            <p>Issue books to students</p>
        </div>

        <button id="issueBtn">
            <i class="fas fa-plus"></i>
            Issue Book
        </button>

    </div>

    <!-- Form -->

    <div class="issue-card">

        <h2>Issue Details</h2>

        <form id="issueForm">

            <div class="form-grid">

                <div class="input-box">

                    <label>Student Name</label>

                    <select id="studentName" required>

                        <option value="">Select Student</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Book Name</label>

                    <select id="bookName" required>

                        <option value="">Select Book</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Issue Date</label>

                    <input
                        type="date"
                        id="issueDate"
                        required>

                </div>

                <div class="input-box">

                    <label>Due Date</label>

                    <input
                        type="date"
                        id="dueDate"
                        required>

                </div>

            </div>

        </form>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchIssue"
            placeholder="Search Student or Book...">

    </div>

    <!-- Table -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Student</th>
                    <th>Book</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="issueTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/issue.js"></script>

</body>
</html>
